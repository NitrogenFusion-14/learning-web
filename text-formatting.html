<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatting</title>
</head>
<body>
    <p>
        <b>bold</b><br>
        <i>italic</i><br>
        <strike>strike</strike><br>
        <del>deleted</del><br>
        <u>underlined</u><br>
        <big>big</big><br>
        <small>small</small><br>
        H<sub>2</sub>O<br>
        <sup>superscript</sup><br>
        <tt>monospaced</tt><br>
        <mark style="background-color:aqua">marked</mark>
    </p>
</body>
</html>
