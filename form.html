<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    
    <form action="sends data to this location" method="POST">

        <label for="name">Name:</label>
        <input id="name" type="text" placeholder="CoolBuy123" required><br>

        <label for="password">Password:</label>
        <input id="password" type="password" required><br>
        
        <label for="dob">Date Of Birth:</label>
        <input id="dob" type="date" required><br>

        <label for="email">Email:</label>
        <input id="email" type="email" placeholder="someone123@gmail.com"><br>

        <label for="remarks">Remarks:</label>
        <textarea rows="3" cols="20"></textarea><br>

        <label for="phoneno">Phone No:</label>
        <input type="tel" id="phoneno" placeholder="+91 1234567890" pattern="+91 [0-9]{10}" required><br>

        <label>Best Player:-</label><br>
        <!-- <label for="neymar">Neymar </label> -->
        <input id="neymar" type="radio" name="fb">Neymar<br>
        <!-- <label for="messi">Messi</label> -->
        <input id="messi" type="radio" name="fb">Messi <br>
        <!-- <label for="ronaldo">Ronaldo</label> -->
        <input id="ronaldo" type="radio" name="fb">Ronaldo<br>

        <label for="color">Select Color:</label>
        <input id="color" type="color"><br>

    </form>

</body>
</html>
