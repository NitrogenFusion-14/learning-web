<html lang="en">
<head>

    <title>Tables</title>
</head>
<body>

        <tr align="center" style="background-color: lightgray; ">
            <th width="70px">Employee</th>
            <th width="70px">Age</th>
            <th width="70px">Salary</th>
            <th width="70px">Expenses</th>
        </tr>
        <tr align="center" style="background-color:dimgray; ">
            <td>Girish</td>
            <td>35</td>
            <td>$4800</td>
            <td>$5000</td>
        </tr>
        <tr align="center" style="background-color: lightgray; ">
            <td>Hari</td>
            <td>24</td>
            <td>$5600</td>
            <td>$4700</td>
        </tr>
        <tr align="center" style="background-color: dimgray; ">
            <td>Ravi</td>
            <td>47</td>
            <td>$7600</td>
            <td>$3900</td>
        </tr>
    </table>
</body>
</html>
