<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
</head>
<body>
    <a onclick="hello()">
    <button style="font-size:large; color: aqua; background-color: blueviolet; border-radius: 25%; border-color: rgb(227, 125, 7);"><b>Click Me!</b></button>
    </a>
    <p id="identity">'Not a Function'</p> 

    <script>
        function hello(){
            document.getElementById("identity").innerHTML = "First javaScript Function!"
        }
    </script>
</body>
</html>
